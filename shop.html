<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artisan Store</title>
<!--
  STANDALONE customer-facing shop. Reads the SAME localStorage the
  back office writes (mod_storefront_config, mod_store_products,
  mod_store_config). Does NOT load app.js.

  Phase A: renders enabled sections in order as a REAL storefront,
  using good-looking defaults for Hero/Features/Promo and pulling
  live data from Simple Store for Categories (product types) and
  Products (actual products). Phase 2 makes the defaults editable
  from the back office. localStorage now; Firebase later.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shop.css">
<script src="js/env.js"></script>
</head>
<body>
  <div class="shop-topbar">
    <a class="shop-brand" href="#home"><span class="brand-ico">&#9670;</span> Artisan Store</a>
    <nav class="shop-nav">
      <a href="#home">Home</a><a href="#shop">Shop</a><a href="#about">About</a>
    </nav>
  </div>
  <div class="shop-wrap" id="shopRoot"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

// Same Firebase project as the back office. This customer page only READS the
// published storefront data — it never writes.
const firebaseConfig = {
  apiKey: "AIzaSyBBfEBrzJZ0k_U4Ch7Iis1mKpkbEFTO-KI",
  authDomain: "my-base-b5936.firebaseapp.com",
  projectId: "my-base-b5936",
  storageBucket: "my-base-b5936.firebasestorage.app",
  messagingSenderId: "125519649834",
  appId: "1:125519649834:web:2c292278b20f0f89d0f753"
};
// Only these keys are public-readable (Security Rules). Fetch each by id — a
// whole-collection query would be denied for an unauthenticated visitor.
const PUBLIC_KEYS = ['mod_storefront_published','mod_storefront_config','mod_store_products','mod_store_config','mod_store_promotions','mod_store_stockpublic'];
const SS = {};   // key -> raw JSON string, mirroring the back office's appdata docs
if(window.APP_MODE === 'firebase'){
  try{
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const snaps = await Promise.all(PUBLIC_KEYS.map(k=> getDoc(doc(db, 'appdata', k)).catch(()=> null)));
    snaps.forEach((s, i)=>{ if(s && s.exists()){ const data = s.data(); if(data && typeof data.v !== 'undefined') SS[PUBLIC_KEYS[i]] = data.v; } });
  }catch(e){ console.error('Shop: Firebase read failed — falling back to localStorage', e); }
}
// Local mode: SS stays empty → read() falls through to localStorage below.

(function(){
  // Reads the Firestore cache first (populated above), then localStorage as a
  // fallback. Values are JSON strings, same shape the back office stored.
  function read(key, fallback){
    try{
      const raw = (key in SS) ? SS[key] : localStorage.getItem(key);
      return raw == null ? fallback : JSON.parse(raw);
    }catch(e){ return fallback; }
  }

  /* ---- Storefront theme: seeds -> CSS vars, with light/dark ---- */
  const STORE_SEEDS = {
    ocean:{deep:'#0B2733',accent:'#1F5C74',pop:'#5E958E',pale:'#DCEAE7'}, harbor:{deep:'#112B3C',accent:'#F66B0E',pop:'#205375',pale:'#EFEFEF'},
    sangria:{deep:'#5E244E',accent:'#AA1C41',pop:'#E68457',pale:'#FFE8B4'}, mulberry:{deep:'#56021F',accent:'#7D1C4A',pop:'#D17D98',pale:'#F4CCE9'},
    fern:{deep:'#1A312C',accent:'#428475',pop:'#89D7B7',pale:'#FFF4E1'}, bubblegum:{deep:'#FF90BB',accent:'#FF90BB',pop:'#8ACCD5',pale:'#F8F8E1'},
    terracotta:{deep:'#5E6A4E',accent:'#B96A4E',pop:'#E9D9C0',pale:'#F2E8DA'}, azure:{deep:'#2A3B86',accent:'#3E6FD1',pop:'#8FCBDE',pale:'#D3E7EC'},
    blossom:{deep:'#FF7CC4',accent:'#FF8FB3',pop:'#FFC79C',pale:'#FBF6C8'}, candy:{deep:'#C25E7E',accent:'#FBB6C7',pop:'#9AD4E0',pale:'#FCFAA8'},
    sage:{deep:'#2C362E',accent:'#3E5045',pop:'#A17C5B',pale:'#DFDACD'}, plum:{deep:'#5C4453',accent:'#75505C',pop:'#9A8768',pale:'#D6A98B'},
    amethyst:{deep:'#231145',accent:'#4B2160',pop:'#A0524F',pale:'#DDA05C'}, orchid:{deep:'#3C2168',accent:'#5E3086',pop:'#E0559E',pale:'#FCA3B0'},
    sunset:{deep:'#F9515A',accent:'#FB8062',pop:'#FFBE7D',pale:'#FCF07A'}, sky:{deep:'#7FA9BA',accent:'#9DC7D6',pop:'#C0DDE4',pale:'#E3F3D9'},
    espresso:{deep:'#000000',accent:'#241810',pop:'#43301A',pale:'#E5DED0'}, cocoa:{deep:'#42292A',accent:'#575859',pop:'#E7D2C4',pale:'#F3E9E4'},
    petal:{deep:'#C9A7C4',accent:'#FBE9EC',pop:'#FBD9DE',pale:'#F5C6D0'}, obsidian:{deep:'#2B2B2B',accent:'#552847',pop:'#8E3459',pale:'#F73758'},
    crimson:{deep:'#1B1717',accent:'#8B1A17',pop:'#D2402E',pale:'#EFEFEF'}, coral:{deep:'#0A1A38',accent:'#8B2144',pop:'#C13350',pale:'#E07A5F'}
  };
  function hexToRgb(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function rgbToHex(r,g,b){ return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
  function mix(a,b,t){ const A=hexToRgb(a),B=hexToRgb(b); return rgbToHex(A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t); }
  function lum(h){ const [r,g,b]=hexToRgb(h).map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}); return 0.2126*r+0.7152*g+0.0722*b; }
  function readableInk(bg){ return lum(bg) > 0.5 ? '#2B2E26' : '#FFFFFF'; }
  // Derive the shop's --s-* tokens from four seeds, for the given mode.
  function deriveShopTheme(seeds, mode){
    const { deep, accent, pop, pale } = seeds;
    if(mode === 'dark'){
      const bg = mix(deep, '#000000', 0.55);
      const panel = mix(deep, '#000000', 0.35);
      return {
        '--s-bg':bg, '--s-card':panel, '--s-cream':mix(deep,pale,0.25),
        '--s-grad2':mix(bg,'#000000',0.35),
        '--s-green':mix(accent,'#FFFFFF',0.18), '--s-green-dk':mix(accent,'#FFFFFF',0.4),
        '--s-text':'#F3F1EC', '--s-muted':mix('#F3F1EC',bg,0.5), '--s-border':mix(panel,'#FFFFFF',0.14)
      };
    }
    return {
      '--s-bg':'#FFFFFF', '--s-card':'#FFFFFF', '--s-cream':mix(pale,'#FFFFFF',0.25),
      '--s-grad2':mix(pale,'#FFFFFF',0.4),
      '--s-green':accent, '--s-green-dk':mix(accent,'#000000',0.22),
      '--s-text':mix(deep,'#000000',0.1), '--s-muted':mix(deep,'#FFFFFF',0.45), '--s-border':mix(pale,'#000000',0.06)
    };
  }
  function applyStorefrontTheme(theme){
    theme = theme || {};
    const preset = theme.preset || 'fern';
    const mode = theme.mode === 'dark' ? 'dark' : 'light';
    const seeds = preset === 'custom'
      ? (theme.customSeeds || STORE_SEEDS.fern)
      : (STORE_SEEDS[preset] || STORE_SEEDS.fern);
    const tokens = deriveShopTheme(seeds, mode);
    const style = document.createElement('style');
    style.textContent = ':root{' + Object.entries(tokens).map(([k,v])=>k+':'+v+';').join('') + '}';
    document.head.appendChild(style);
    if(mode === 'dark') document.body.classList.add('shop-dark');
  }
  // Store name: set the header brand + footer + <title>, with optional colour.
  function applyStoreName(cfg){
    const name = (cfg && cfg.storeName) ? cfg.storeName : 'Artisan Store';
    document.title = name;
    const brand = document.querySelector('.shop-brand');
    if(brand){
      brand.innerHTML = '<span class="brand-ico">&#9670;</span> ' + escBasic(name);
      const c = cfg && cfg.storeNameColors;
      if(c && c.mode === 'custom' && c.text) brand.style.color = c.text;
    }
    window.__storeName = name;  // footer reads this at render time
  }
  function escBasic(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  const esc = (s)=> String(s == null ? '' : s).replace(/[&<>"']/g, c=>(
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
  const money = (n)=> Number(n||0).toLocaleString('en-US');

  // Per-section colour override: when mode==='custom', emit inline CSS vars
  // that shadow the theme tokens for just that section's subtree.
  function sectionColorVars(colors){
    if(!colors || colors.mode !== 'custom') return '';
    const map = { '--s-bg':colors.bg, '--s-text':colors.text, '--s-card':colors.card, '--s-green':colors.green || colors.accent };
    return Object.entries(map).filter(([,v])=>v).map(([k,v])=>k+':'+v).join(';') + ';';
  }

  // Per-field text colour. tc = {mode,color}; 'custom' pins the colour on that
  // one element (inline style beats the section/theme text colour). 'theme' or
  // missing → return nothing, so the element keeps whatever it resolves to now.
  function tcol(tc){ return (tc && tc.mode === 'custom' && tc.color) ? 'color:' + tc.color + ';' : ''; }

  // Load a Google Font on demand (once per family).
  const loadedFonts = {};
  function loadFont(family){
    if(!family || family === 'Poppins' || loadedFonts[family]) return;
    loadedFonts[family] = true;
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(family).replace(/%20/g,'+') + ':wght@400;600;700;800&display=swap';
    document.head.appendChild(link);
  }

  // Customers read the PUBLISHED copy; ?preview=1 reads the live DRAFT
  // so the shop owner can check changes before publishing.
  const isPreview = /[?&]preview=1\b/.test(location.search);
  const cfg = isPreview
    ? read('mod_storefront_config', null)
    : (read('mod_storefront_published', null) || read('mod_storefront_config', null));
  const products = read('mod_store_products', []);
  const stockPub = read('mod_store_stockpublic', {});
  const storeCfg = read('mod_store_config', null);
  const productTypes = (storeCfg && Array.isArray(storeCfg.productTypes)) ? storeCfg.productTypes : [];
  const promotions = read('mod_store_promotions', []);

  // Active promotion discount for a product today (0 = not on sale). Mirrors the
  // back office: today within [effectiveDate, endDate], highest % wins.
  function todayStr(){ const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  function promoPct(productId){
    const today = todayStr();
    let best = 0;
    (promotions || []).forEach(p=>{
      if(p.effectiveDate && p.effectiveDate > today) return;
      if(p.endDate && p.endDate < today) return;
      const it = (p.items || []).find(x=> x.productId === productId);
      if(it && (it.percent || 0) > best) best = it.percent;
    });
    return best;
  }
  function round2(n){ return Math.round(n * 100) / 100; }
  function salePrice(p){ const pct = promoPct(p.id); return pct > 0 ? round2(p.price * (1 - pct/100)) : p.price; }

  // ---- Theme: derive shop CSS vars from the chosen palette seeds ----
  applyStorefrontTheme(cfg && cfg.theme);
  applyStoreName(cfg);

  // Preview banner so the owner knows this isn't the live view.
  if(isPreview){
    const bar = document.createElement('div');
    bar.style.cssText = 'background:#2B2E26;color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:600;';
    bar.textContent = '\u{1F441}\uFE0F Preview \u2014 \u0E19\u0E35\u0E48\u0E04\u0E37\u0E2D\u0E15\u0E31\u0E27\u0E2D\u0E22\u0E48\u0E32\u0E07 (draft) \u0E22\u0E31\u0E07\u0E44\u0E21\u0E48\u0E44\u0E14\u0E49 publish';
    document.body.insertBefore(bar, document.body.firstChild);
  }

  const root = document.getElementById('shopRoot');

  if(!cfg || !Array.isArray(cfg.sections)){
    root.innerHTML =
      '<div class="shop-empty"><div class="shop-empty-ico">&#127978;</div>'+
      '<div>\u0E22\u0E31\u0E07\u0E44\u0E21\u0E48\u0E21\u0E35\u0E01\u0E32\u0E23\u0E15\u0E31\u0E49\u0E07\u0E04\u0E48\u0E32\u0E2B\u0E19\u0E49\u0E32\u0E23\u0E49\u0E32\u0E19</div>'+
      '<div style="font-size:12px;margin-top:6px;">\u0E44\u0E1B\u0E17\u0E35\u0E48 Storefront \u0E43\u0E19\u0E23\u0E30\u0E1A\u0E1A\u0E2B\u0E25\u0E31\u0E07\u0E1A\u0E49\u0E32\u0E19\u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E08\u0E31\u0E14\u0E2B\u0E19\u0E49\u0E32\u0E23\u0E49\u0E32\u0E19\u0E01\u0E48\u0E2D\u0E19</div></div>';
    return;
  }

  // Category circle tint pool (cycles).
  const TINTS = ['#DCE3D3','#EADBDD','#EFE6D6','#E7DDE9','#D8E5E6','#EDE2D2'];
  const CAT_ICON = ['\u{1F3A7}','\u{1F457}','\u{1FA91}','\u{1F9F4}','\u{1F45F}','\u231A','\u{1F484}','\u{1F455}'];
  const PROD_ICON = '\u{1F6CD}\uFE0F';

  // Shared product card — shows a sale badge + struck-through original price when
  // an active promotion covers the product. Used by Best Selling and the listing.
  // Image list for a product, optionally for a specific colour index.
  // Falls back to the product-level images when the colour has none.
  function imgsOf(p, ci){
    const cols = (p && p.hasColors && Array.isArray(p.colors)) ? p.colors : [];
    if(cols.length && ci != null && cols[ci]){
      const c = cols[ci];
      const ci_imgs = Array.isArray(c.images) ? c.images.filter(Boolean) : (c.image ? [c.image] : []);
      if(ci_imgs.length) return ci_imgs;
    }
    return Array.isArray(p.images) ? p.images.filter(Boolean) : (p.image ? [p.image] : []);
  }
  function paintCard(holder){
    const p = products.find(x=> x.id === holder.dataset.pid);
    if(!p) return;
    const ciRaw = holder.dataset.ci;
    const list = imgsOf(p, ciRaw === '' ? null : +ciRaw);
    let gi = parseInt(holder.dataset.gi, 10) || 0;
    if(gi >= list.length) gi = 0;
    holder.dataset.gi = gi;
    if(list.length){
      let im = holder.querySelector('img');
      if(!im){ im = document.createElement('img'); im.alt = ''; holder.appendChild(im); }
      im.src = list[gi];
    }
    holder.querySelectorAll('.s-gal-nav').forEach(b=> b.style.display = list.length > 1 ? '' : 'none');
    const dots = holder.querySelector('.s-gal-dots');
    if(dots) dots.innerHTML = list.length > 1
      ? list.map(function(_, k){ return '<i class="s-gal-dot'+(k===gi?' on':'')+'"></i>'; }).join('')
      : '';
  }
  function productCardHtml(p){
    const cols = (p.hasColors && Array.isArray(p.colors)) ? p.colors.filter(c=> c) : [];
    const gal = imgsOf(p, cols.length ? 0 : null);
    const maxLen = Math.max.apply(null, [gal.length].concat(cols.map(function(_, i){ return imgsOf(p, i).length; })));
    const img = gal.length ? '<img src="'+esc(gal[0])+'" alt="">' : PROD_ICON;
    const nav = maxLen > 1
      ? '<button type="button" class="s-gal-nav prev" data-dir="-1">&#8249;</button>'+
        '<button type="button" class="s-gal-nav next" data-dir="1">&#8250;</button>'+
        '<div class="s-gal-dots">'+ gal.map(function(_, k){ return '<i class="s-gal-dot'+(k===0?' on':'')+'"></i>'; }).join('') +'</div>'
      : '';
    const swatches = cols.length
      ? '<div class="s-swatches">'+ cols.map(function(c,i){
          return '<button type="button" class="s-swatch'+(i===0?' active':'')+'" data-pid="'+esc(p.id)+'" data-ci="'+i+'" title="'+esc(c.name||'')+'" style="background:'+esc(c.hex||'#ccc')+'"></button>';
        }).join('') +'</div>'
      : '';
    const pct = promoPct(p.id);
    const badge = pct > 0 ? '<div class="s-card-sale">'+pct+'% off</div>' : '';
    const priceBlock = pct > 0
      ? '<div class="s-card-price"><span class="now">$'+money(salePrice(p))+'</span><span class="was">$'+money(p.price)+'</span></div>'
      : '<div class="s-card-price"><span class="now">$'+money(p.price)+'</span></div>';
    return '<div class="s-card">'+
      '<div class="s-card-img" data-pid="'+esc(p.id)+'" data-ci="'+(cols.length?'0':'')+'" data-gi="0">'+badge+img+nav+'<div class="s-card-fav">&#9825;</div></div>'+
      '<div class="s-card-body">'+
        '<div class="s-card-name">'+esc(p.name||'-')+'</div>'+
        swatches+
        priceBlock+
      '</div>'+
      '<button class="s-card-cart" data-detail="'+esc(p.id)+'">&#128269; Product Detail</button>'+
    '</div>';
  }

  function renderHero(s){
    const d = Object.assign({
      badge:'NEW ARRIVALS', heading:'Discover The Best Products for You',
      subtext:'Explore our wide range of high-quality products at affordable prices. Shop now and enjoy the best deals!',
      primaryText:'Shop Now', secondaryText:'Explore Deals', image:null, showProductImage:true, bgImage:null, align:'left', font:'Poppins'
    }, s.data || {});
    loadFont(d.font);
    const tc = d.textColors || {};
    const heading = esc(d.heading).replace(/\n/g, '<br>');
    const imgInner = d.image ? '<img src="'+esc(d.image)+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:20px;">' : '&#128188;';
    const badge = d.badge ? '<span class="s-hero-badge" style="'+tcol(tc.badge)+'">&#9679; '+esc(d.badge)+'</span>' : '';
    const primary = d.primaryText ? '<a class="s-btn s-btn-primary" href="#products" style="'+tcol(tc.primaryText)+'">'+esc(d.primaryText)+' &rarr;</a>' : '';
    const secondary = d.secondaryText ? '<a class="s-btn s-btn-ghost" href="#" style="'+tcol(tc.secondaryText)+'">'+esc(d.secondaryText)+'</a>' : '';
    // Background image: text overlays it, with a soft dark scrim for readability.
    const hasBg = !!d.bgImage;
    const custBg = (d.colors && d.colors.mode === 'custom' && d.colors.bg) ? d.colors.bg : '';
    const bgStyle = hasBg
      ? 'background-image:linear-gradient(rgba(0,0,0,0.28),rgba(0,0,0,0.28)),url('+esc(d.bgImage)+');background-size:cover;background-position:center;'
      : (custBg ? 'background:'+esc(custBg)+';' : '');
    // Right product image: toggle collapses it via opacity (keeps the grid layout).
    const imgOpacity = d.showProductImage === false ? 'opacity:0;' : '';
    return (
      '<section class="s-hero s-align-'+esc(d.align)+(hasBg?' s-hero-bg':'')+'" style="font-family:\''+esc(d.font)+'\',sans-serif;'+sectionColorVars(d.colors)+bgStyle+'">'+
        '<div class="s-hero-text">'+
          badge+
          '<h1 style="'+tcol(tc.heading)+'">'+heading+'</h1>'+
          (d.subtext ? '<p style="'+tcol(tc.subtext)+'">'+esc(d.subtext)+'</p>' : '')+
          '<div class="s-hero-cta">'+primary+secondary+'</div>'+
        '</div>'+
        '<div class="s-hero-img" style="'+imgOpacity+'"><div class="s-hero-photo">'+imgInner+'</div></div>'+
      '</section>'
    );
  }

  function renderFeatures(s){
    const d = s.data || {};
    let feats = Array.isArray(d.items) ? d.items : null;
    if(!feats){
      feats = [
        {icon:'\u{1F69A}',title:'Free Shipping',desc:'On orders over $50',image:null},
        {icon:'\u{1F512}',title:'Secure Payment',desc:'100% secure payment',image:null},
        {icon:'\u21BA',title:'Easy Returns',desc:'30 days return policy',image:null},
        {icon:'\u{1F3A7}',title:'24/7 Support',desc:'Dedicated support',image:null}
      ];
    }
    if(feats.length === 0) return '';
    return '<section class="s-sec" style="'+sectionColorVars(s.data.colors)+'"><div class="s-features" style="grid-template-columns:repeat('+feats.length+',1fr);">'+
      feats.map(f=>{
        const ico = f.image ? '<img src="'+esc(f.image)+'" alt="" style="width:100%;height:100%;object-fit:contain;padding:18%;border-radius:50%;">' : (esc(f.icon)||'\u2B50');
        return '<div class="s-feat"><div class="s-feat-ico">'+ico+'</div>'+
          '<div><div class="s-feat-title" style="'+tcol(f.titleColor)+'">'+esc(f.title)+'</div>'+
          '<div class="s-feat-desc" style="'+tcol(f.descColor)+'">'+esc(f.desc)+'</div></div></div>';
      }).join('')+
    '</div></section>';
  }

  function renderCategories(s){
    const d = s.data || {};
    const tc = d.textColors || {};
    const heading = d.heading != null ? d.heading : 'Shop by Categories';
    const styles = d.styles || {};
    // Live from Simple Store product types; fall back to a sample set.
    let cats = productTypes.map(t=> t.name);
    if(cats.length === 0) cats = ['Electronics','Fashion','Home & Kitchen','Beauty','Sports','Accessories'];
    // Drop categories the owner toggled off.
    cats = cats.filter(name=> !(styles[name] && styles[name].show === false));
    if(cats.length === 0) return '';
    return '<section class="s-sec" style="'+sectionColorVars(s.data.colors)+'">'+
      '<div class="s-sec-head"><div class="s-sec-title" style="'+tcol(tc.heading)+'">'+esc(heading)+'</div>'+
      '<a class="s-sec-link" href="#shop">View All Categories &rarr;</a></div>'+
      '<div class="s-cats">'+
        cats.slice(0,6).map((name,i)=>{
          const st = styles[name] || {};
          const color = st.color || TINTS[i%TINTS.length];
          const inner = st.image
            ? '<img src="'+esc(st.image)+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
            : CAT_ICON[i%CAT_ICON.length];
          return '<div class="s-cat"><div class="s-cat-circle" style="background:'+esc(color)+'">'+
          inner+'</div><div class="s-cat-name">'+esc(name)+'</div></div>';
        }).join('')+
      '</div></section>';
  }

  function renderProducts(s){
    const d = s.data || {};
    const tc = d.textColors || {};
    const heading = d.heading != null ? d.heading : 'Best Selling Products';
    // Picked ids in order; empty = show all (up to 10).
    let list;
    if(Array.isArray(d.productIds) && d.productIds.length > 0){
      list = d.productIds.map(id=> products.find(p=> p.id===id)).filter(Boolean);
    }else{
      list = products.slice(0, 10);
    }
    const body = list.length === 0
      ? '<div class="shop-empty" style="padding:40px;">\u0E22\u0E31\u0E07\u0E44\u0E21\u0E48\u0E21\u0E35\u0E2A\u0E34\u0E19\u0E04\u0E49\u0E32\u0E43\u0E19 Simple Store</div>'
      : '<div class="s-products">'+ list.map(productCardHtml).join('') +'</div>';
    return '<section class="s-sec" id="products" style="'+sectionColorVars(s.data.colors)+'">'+
      '<div class="s-sec-head"><div class="s-sec-title" style="'+tcol(tc.heading)+'">'+esc(heading)+'</div>'+
      '<a class="s-sec-link" href="#shop">View All Products &rarr;</a></div>'+ body +'</section>';
  }

  function renderPromo(s){
    const d = Object.assign({
      eyebrow:'Special Offer', heading:'Up to 50% Off',
      subtext:'Limited time offer on selected items. Hurry up and grab the best deals!',
      buttonText:'Shop the Sale', image:null, showImage:true, showButton:true
    }, s.data || {});
    const imgInner = d.image ? '<img src="'+esc(d.image)+'" alt="" style="width:100%;height:100%;object-fit:contain;">' : '&#128717;';
    const imgOpacity = d.showImage === false ? 'opacity:0;' : '';
    const tc = d.textColors || {};
    const button = d.showButton !== false && d.buttonText
      ? '<a class="s-btn s-btn-primary" href="#" style="'+tcol(tc.buttonText)+'">'+esc(d.buttonText)+' &rarr;</a>' : '';
    return '<section class="s-sec" style="'+sectionColorVars(s.data.colors)+'"><div class="s-promo">'+
      '<div class="s-promo-text">'+
        (d.eyebrow ? '<div class="s-promo-eyebrow" style="'+tcol(tc.eyebrow)+'">'+esc(d.eyebrow)+'</div>' : '')+
        '<h2 style="'+tcol(tc.heading)+'">'+esc(d.heading)+'</h2>'+
        (d.subtext ? '<p style="'+tcol(tc.subtext)+'">'+esc(d.subtext)+'</p>' : '')+
        button+
      '</div>'+
      '<div class="s-promo-img" style="'+imgOpacity+'">'+imgInner+'</div>'+

  function renderNews(s){
    const d = Object.assign({
      eyebrow:'What\u2019s New', heading:'Latest News',
      subtext:'Stay tuned for our latest updates and announcements.', image:null, showImage:true
    }, s.data || {});
    const imgInner = d.image ? '<img src="'+esc(d.image)+'" alt="" style="width:100%;height:100%;object-fit:contain;">' : '&#128240;';
    const imgOpacity = d.showImage === false ? 'opacity:0;' : '';
    const tc = d.textColors || {};
    return '<section class="s-sec" style="'+sectionColorVars(s.data.colors)+'"><div class="s-promo s-news">'+
      '<div class="s-promo-text">'+
        (d.eyebrow ? '<div class="s-promo-eyebrow" style="'+tcol(tc.eyebrow)+'">'+esc(d.eyebrow)+'</div>' : '')+
        '<h2 style="'+tcol(tc.heading)+'">'+esc(d.heading)+'</h2>'+
        (d.subtext ? '<p style="'+tcol(tc.subtext)+'">'+esc(d.subtext)+'</p>' : '')+
      '</div>'+
      '<div class="s-promo-img" style="'+imgOpacity+'">'+imgInner+'</div>'+
    '</div></section>';

  function renderContact(s){
    const d = s.data || {};
    const tc = d.textColors || {};
    const heading = d.heading != null ? d.heading : 'Follow Us';
    const boxes = Array.isArray(d.boxes) ? d.boxes : [];
    if(boxes.length === 0) return '';
    return '<section class="s-sec s-contact" style="'+sectionColorVars(s.data.colors)+'">'+
      '<div class="s-contact-head"><div class="s-sec-title" style="'+tcol(tc.heading)+'">'+esc(heading)+'</div>'+
      (d.subtext ? '<p class="s-contact-sub" style="'+tcol(tc.subtext)+'">'+esc(d.subtext)+'</p>' : '')+'</div>'+
      '<div class="s-contact-grid">'+
        boxes.map(b=>{
          const inner = b.image
            ? '<img src="'+esc(b.image)+'" alt="">'
            : '<span class="s-contact-emoji">'+esc(b.icon||'\u{1F310}')+'</span>';
          return '<button class="s-contact-box" data-action="'+esc(b.action||'open')+'" data-value="'+esc(b.value||'')+'">'+
            '<span class="s-contact-circle">'+inner+'</span>'+
            '<span class="s-contact-label" style="'+tcol(b.labelColor)+'">'+esc(b.label||'')+'</span>'+
          '</button>';
        }).join('')+
      '</div></section>';

  /* ---- Product Listing (Shop page): filter sidebar + paginated grid ---- */
  const PL_PER_PAGE = 24;   // 4 columns × 6 rows
  let plState = null;       // { cats:Set, min, max, onSale, page }

  function renderProductList(s){
    const d = s.data || {};
    const tc = d.textColors || {};
    const heading = d.heading != null ? d.heading : 'Shop All';
    return '<section class="s-sec s-shoplist" style="'+sectionColorVars(d.colors)+'">'+
      '<div class="s-sec-head"><div class="s-sec-title" style="'+tcol(tc.heading)+'">'+esc(heading)+'</div>'+
        '<span class="s-shop-count" id="sCount"></span></div>'+
      '<div class="s-products s-shop-grid" id="sGrid"></div>'+
      '<div class="s-pager" id="sPager"></div>'+
    '</section>';
  }

  function priceBounds(){
    if(products.length === 0) return { min:0, max:0 };
    let lo = Infinity, hi = -Infinity;
    products.forEach(p=>{ const v = salePrice(p); if(v<lo) lo=v; if(v>hi) hi=v; });
    return { min: Math.floor(lo), max: Math.ceil(hi) };
  }

  function mountProductList(){
    const filterEl = document.getElementById('sFilter');
    if(!filterEl) return;   // no productlist on this page
    const bounds = priceBounds();
    if(!plState) plState = { cats:new Set(), min:bounds.min, max:bounds.max, onSale:false, page:1 };
    const catRows = productTypes.length
      ? productTypes.map(t=> '<label class="s-filter-check"><input type="checkbox" data-cat="'+esc(t.name)+'"'+(plState.cats.has(t.name)?' checked':'')+'><span>'+esc(t.name)+'</span></label>').join('')
      : '<div class="s-filter-empty">\u2014</div>';
    filterEl.innerHTML =
      '<div class="s-filter-title">Filter Options</div>'+
      '<div class="s-filter-group"><div class="s-filter-head">By Categories</div>'+catRows+'</div>'+
      '<div class="s-filter-group"><div class="s-filter-head">Price</div>'+
        '<div class="s-filter-price"><input type="number" id="sPriceMin" value="'+plState.min+'"> <span>\u2013</span> <input type="number" id="sPriceMax" value="'+plState.max+'"></div>'+
      '</div>'+
      '<div class="s-filter-group"><div class="s-filter-head">By Promotion</div>'+
        '<label class="s-filter-check"><input type="checkbox" id="sOnSale"'+(plState.onSale?' checked':'')+'><span>On Sale</span></label>'+
      '</div>'+
      '<button class="s-filter-clear" id="sClear">Clear All</button>';
    filterEl.querySelectorAll('[data-cat]').forEach(cb=> cb.addEventListener('change', ()=>{
      if(cb.checked) plState.cats.add(cb.dataset.cat); else plState.cats.delete(cb.dataset.cat);
      plState.page = 1; drawGrid();
    }));
    const minEl = document.getElementById('sPriceMin'), maxEl = document.getElementById('sPriceMax');
    minEl.addEventListener('input', ()=>{ plState.min = parseFloat(minEl.value); plState.page = 1; drawGrid(); });
    maxEl.addEventListener('input', ()=>{ plState.max = parseFloat(maxEl.value); plState.page = 1; drawGrid(); });
    document.getElementById('sOnSale').addEventListener('change', (e)=>{ plState.onSale = e.target.checked; plState.page = 1; drawGrid(); });
    document.getElementById('sClear').addEventListener('click', ()=>{ plState = { cats:new Set(), min:bounds.min, max:bounds.max, onSale:false, page:1 }; mountProductList(); });
    drawGrid();
  }

  function filteredList(){
    let list = products.slice();
    if(plState.cats.size) list = list.filter(p=> plState.cats.has(p.productType));
    if(plState.onSale) list = list.filter(p=> promoPct(p.id) > 0);
    const min = isNaN(plState.min) ? null : plState.min, max = isNaN(plState.max) ? null : plState.max;
    list = list.filter(p=>{ const v = salePrice(p); return (min==null||v>=min) && (max==null||v<=max); });
    return list;
  }

  function drawGrid(){
    const grid = document.getElementById('sGrid');
    if(!grid) return;
    const countEl = document.getElementById('sCount'), pager = document.getElementById('sPager');
    const list = filteredList();
    const pages = Math.max(1, Math.ceil(list.length / PL_PER_PAGE));
    if(plState.page > pages) plState.page = pages;
    const start = (plState.page - 1) * PL_PER_PAGE;
    const pageItems = list.slice(start, start + PL_PER_PAGE);
    if(countEl){
      const from = list.length === 0 ? 0 : start + 1, to = start + pageItems.length;
      countEl.textContent = 'Showing ' + from + '-' + to + ' of ' + list.length + ' results';
    }
    grid.innerHTML = pageItems.length === 0
      ? '<div class="shop-empty" style="grid-column:1/-1;padding:48px;">No products match these filters</div>'
      : pageItems.map(productCardHtml).join('');
    if(pager){
      if(pages <= 1){ pager.innerHTML = ''; }
      else{
        let btns = '<button class="s-page-btn" data-pg="'+(plState.page-1)+'"'+(plState.page===1?' disabled':'')+'>&larr;</button>';
        for(let i=1;i<=pages;i++) btns += '<button class="s-page-btn'+(i===plState.page?' active':'')+'" data-pg="'+i+'">'+i+'</button>';
        btns += '<button class="s-page-btn" data-pg="'+(plState.page+1)+'"'+(plState.page===pages?' disabled':'')+'>&rarr;</button>';
        pager.innerHTML = btns;
        pager.querySelectorAll('[data-pg]').forEach(b=> b.addEventListener('click', ()=>{
          const pg = parseInt(b.dataset.pg,10);
          if(pg>=1 && pg<=pages && pg!==plState.page){ plState.page = pg; drawGrid(); window.scrollTo({ top:0, behavior:'smooth' }); }
        }));
      }
    }
  }

  // Manual image + title cards (About Layout): a grid of cards, each with an
  // image and a title. Same card look as products, minus price/cart.
  function renderCards(s){
    const d = s.data || {};
    const tc = d.textColors || {};
    const items = Array.isArray(d.items) ? d.items : [];
    const heading = d.heading != null ? d.heading : '';
    const head = heading ? '<div class="s-sec-head"><div class="s-sec-title" style="'+tcol(tc.heading)+'">'+esc(heading)+'</div></div>' : '';
    if(items.length === 0) return head ? '<section class="s-sec" style="'+sectionColorVars(d.colors)+'">'+head+'</section>' : '';
    return '<section class="s-sec" style="'+sectionColorVars(d.colors)+'">'+head+
      '<div class="s-cards-grid">'+ items.map(it=>{
        const img = it.image ? '<img src="'+esc(it.image)+'" alt="">' : '&#128247;';
        return '<div class="s-cardx"><div class="s-cardx-img">'+img+'</div>'+
          '<div class="s-cardx-title" style="'+tcol(it.titleColor)+'">'+esc(it.title||'')+'</div></div>';
      }).join('') +'</div>'+
    '</section>';
  }

  // ---- Single product detail page (#/product/<id>) ----
  function stockOfPub(p, colorId){
    const e = stockPub[p.id];
    if(!e) return (typeof p.stock === 'number' ? p.stock : null);
    if(colorId && e.colors && typeof e.colors[colorId] === 'number') return e.colors[colorId];
    return typeof e.total === 'number' ? e.total : null;
  }
  function priceOf(p, col){
    if(col && col.price != null && col.price !== '') return Number(col.price);
    return Number(p.price) || 0;
  }
  function paintDetail(){
    const wrap = document.getElementById('sDetail');
    if(!wrap) return;
    const p = products.find(x=> x.id === wrap.dataset.pid);
    if(!p) return;
    const cols = (p.hasColors && Array.isArray(p.colors)) ? p.colors : [];
    const ciRaw = wrap.dataset.ci;
    const ci = ciRaw === '' ? null : +ciRaw;
    const col = (ci != null && cols[ci]) ? cols[ci] : null;
    const list = imgsOf(p, ci);
    let gi = parseInt(wrap.dataset.gi, 10) || 0;
    if(gi >= list.length) gi = 0;
    wrap.dataset.gi = gi;
    const big = wrap.querySelector('.s-detail-big');
    if(big) big.innerHTML = list.length
      ? '<img src="'+esc(list[gi])+'" alt="">'+
        (list.length > 1 ? '<button type="button" class="s-gal-nav prev s-detail-nav" data-dir="-1">&#8249;</button><button type="button" class="s-gal-nav next s-detail-nav" data-dir="1">&#8250;</button>' : '')
      : '<div class="s-detail-noimg">'+PROD_ICON+'</div>';
    const th = wrap.querySelector('.s-detail-thumbs');
    if(th) th.innerHTML = list.length > 1
      ? list.map(function(src, k){ return '<button type="button" class="s-detail-thumb'+(k===gi?' on':'')+'" data-gi="'+k+'"><img src="'+esc(src)+'" alt=""></button>'; }).join('')
      : '';
    wrap.querySelectorAll('.s-detail-swatch').forEach(function(b){ b.classList.toggle('active', +b.dataset.ci === ci); });
    const cn = wrap.querySelector('.s-detail-colorname');
    if(cn) cn.textContent = col ? (col.name || '') : '';
    const pr = wrap.querySelector('.s-detail-price');
    if(pr){
      const pc = promoPct(p.id), base = priceOf(p, col);
      pr.innerHTML = pc > 0
        ? '<span class="now">$'+money(round2(base * (1 - pc/100)))+'</span> <span class="was">$'+money(base)+'</span> <span class="s-detail-off">'+pc+'% off</span>'
        : '<span class="now">$'+money(base)+'</span>';
    }
    const stEl = wrap.querySelector('.s-detail-stock');
    if(stEl){
      const n = stockOfPub(p, col ? col.id : null);
      stEl.innerHTML = n == null
        ? ''
        : (n > 0 ? '<span class="s-stock-in">&#10003; In stock: '+n+'</span>' : '<span class="s-stock-out">Out of stock</span>');
    }
  }
  // Sections the user added under the built-in detail block (Storefront →
  // Product Detail Layout). The 'productdetail' row is just an editor
  // placeholder for the block above, so it renders nothing here.
  function detailSectionsHtml(){
    const list = Array.isArray(cfg.detailSections) ? cfg.detailSections : [];
    const secs = list.filter(function(s){ return s.enabled && s.type !== 'productdetail' && RENDER[s.type]; });
    if(!secs.length) return '';
    return '<div class="s-detail-extra">'+ secs.map(function(s){ return RENDER[s.type](s); }).join('') +'</div>';
  }
  function renderProductDetail(pid){
    const p = products.find(x=> x.id === pid);
    const footer = '<div class="shop-foot">'+esc(window.__storeName || 'Artisan Store')+' \u00B7 powered by Jigsaw Workspace</div>';
    if(!p){
      root.innerHTML = '<div class="shop-empty"><div class="shop-empty-ico">&#128533;</div><div>Product not found</div><a class="s-detail-back" href="#/shop">&larr; Back to shop</a></div>'+footer;
      return;
    }
    const cols = (p.hasColors && Array.isArray(p.colors)) ? p.colors : [];
    const swatches = cols.length
      ? '<div class="s-detail-row"><span class="s-detail-label">Colour</span><div class="s-detail-colors">'+
          cols.map(function(c,i){ return '<button type="button" class="s-detail-swatch'+(i===0?' active':'')+'" data-ci="'+i+'" title="'+esc(c.name||'')+'" style="background:'+esc(c.hex||'#ccc')+'"></button>'; }).join('')+
        '</div><span class="s-detail-colorname"></span></div>'
      : '';
    const desc = (p.description || '').trim();
    root.innerHTML =
      '<div class="s-detail" id="sDetail" data-pid="'+esc(p.id)+'" data-ci="'+(cols.length?'0':'')+'" data-gi="0">'+
        '<a class="s-detail-back" href="#/shop">&larr; Back to shop</a>'+
        '<div class="s-detail-main">'+
          '<div class="s-detail-gallery">'+
            '<div class="s-detail-big"></div>'+
            '<div class="s-detail-thumbs"></div>'+
          '</div>'+
          '<div class="s-detail-info">'+
            '<h1 class="s-detail-name">'+esc(p.name || '-')+'</h1>'+
            (p.sku ? '<div class="s-detail-sku">SKU '+esc(p.sku)+'</div>' : '')+
            '<div class="s-detail-price"></div>'+
            swatches+
            '<div class="s-detail-stock"></div>'+
            (desc ? '<div class="s-detail-desc"><h3>Description</h3><p>'+esc(desc).replace(/\n/g, '<br>')+'</p></div>' : '')+
          '</div>'+
        '</div>'+
      '</div>'+
      detailSectionsHtml()+
      footer;
    paintDetail();
    mountProductList();   // no-op unless a listing section was added below
  }

  const RENDER = { hero:renderHero, features:renderFeatures, categories:renderCategories, products:renderProducts, promo:renderPromo, news:renderNews, contact:renderContact, productlist:renderProductList, cards:renderCards };

  // ---- Hash routing: #shop → Shop Layout, #about → About Layout, else Home ----
  function routeName(){ return (location.hash || '').replace(/^#\/?/, '').toLowerCase(); }
  // Product ids are case-sensitive, so read them off the raw hash.
  function detailId(){ const m = (location.hash || '').match(/^#\/?product\/(.+)$/i); return m ? decodeURIComponent(m[1]) : null; }
  function isShopRoute(){ return routeName() === 'shop'; }
  function currentList(){
    const r = routeName();
    // Each route shows ONLY its own layout — never fall back to Home, or the
    // Shop/About page would show Home's sections when its own list is missing
    // (e.g. a published copy made before that layout existed). Empty → publish.
    if(r === 'shop') return Array.isArray(cfg.shopSections) ? cfg.shopSections : [];
    if(r === 'about') return Array.isArray(cfg.aboutSections) ? cfg.aboutSections : [];
    return cfg.sections || [];
  }
  function setActiveNav(){
    const r = routeName();
    document.querySelectorAll('.shop-nav a').forEach(a=>{
      const href = (a.getAttribute('href') || '').replace(/^#\/?/, '').toLowerCase();
      let on;
      if(r === 'shop') on = href === 'shop';
      else if(r === 'about') on = href === 'about';
      else on = (href === 'home' || href === '');
      a.classList.toggle('active', on);
    });
  }
  function renderRoute(){
    const _pid = detailId();
    if(_pid){ plState = null; renderProductDetail(_pid); setActiveNav(); window.scrollTo({ top:0 }); return; }
    plState = null;   // fresh filters on navigation
    let enabled = (currentList() || []).filter(s=> s.enabled);
    if(routeName() === 'about') enabled = enabled.filter(s=> s.type !== 'hero');  // About has no Hero, even if an old published copy still carries one
    const footer = '<div class="shop-foot">'+esc(window.__storeName || 'Artisan Store')+' \u00B7 powered by Jigsaw Workspace</div>';
    if(enabled.length === 0){
      root.innerHTML = '<div class="shop-empty"><div class="shop-empty-ico">&#128230;</div><div>\u0E22\u0E31\u0E07\u0E44\u0E21\u0E48\u0E21\u0E35 section \u0E17\u0E35\u0E48\u0E40\u0E1B\u0E34\u0E14\u0E43\u0E0A\u0E49\u0E07\u0E32\u0E19</div></div>';
    }else if(isShopRoute() && enabled.some(s=> s.type === 'productlist')){
      // Shop page: Hero(es) full-width on top, then a Filter container down the
      // left, beside the rest of the content (Best Selling, grid, ...).
      const heroes = enabled.filter(s=> s.type === 'hero');
      const rest = enabled.filter(s=> s.type !== 'hero');
      root.innerHTML =
        heroes.map(s=> RENDER[s.type](s)).join('') +
        '<div class="s-shop-page">'+
          '<aside class="s-filter" id="sFilter"></aside>'+
          '<div class="s-shop-content">'+ rest.map(s=> (RENDER[s.type] ? RENDER[s.type](s) : '')).join('') +'</div>'+
        '</div>' +
        footer;
      mountProductList();
    }else{
      root.innerHTML = enabled.map(s=> (RENDER[s.type] ? RENDER[s.type](s) : '')).join('') + footer;
      mountProductList();   // no-op when the page has no product listing
    }
    setActiveNav();
    window.scrollTo({ top:0 });
  }
  window.addEventListener('hashchange', renderRoute);
  renderRoute();

  // Contact boxes: open a link in a new tab, or copy the value + toast.
  function toast(msg){
    let t = document.getElementById('shopToast');
    if(!t){
      t = document.createElement('div');
      t.id = 'shopToast';
      t.className = 's-toast';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove('show'), 1800);
  }
  root.addEventListener('click', (e)=>{
    const openBtn = e.target.closest('[data-detail]');
    if(openBtn){ location.hash = '#/product/' + encodeURIComponent(openBtn.dataset.detail); return; }
    const dwrap = e.target.closest('#sDetail');
    if(dwrap){
      const dsw = e.target.closest('.s-detail-swatch');
      if(dsw){ dwrap.dataset.ci = dsw.dataset.ci; dwrap.dataset.gi = 0; paintDetail(); return; }
      const dth = e.target.closest('.s-detail-thumb');
      if(dth){ dwrap.dataset.gi = dth.dataset.gi; paintDetail(); return; }
      const dnav = e.target.closest('.s-detail-nav');
      if(dnav){
        const p = products.find(x=> x.id === dwrap.dataset.pid);
        const ciRaw = dwrap.dataset.ci;
        const list = p ? imgsOf(p, ciRaw === '' ? null : +ciRaw) : [];
        if(list.length > 1){
          const gi = parseInt(dwrap.dataset.gi, 10) || 0;
          dwrap.dataset.gi = (gi + (+dnav.dataset.dir) + list.length) % list.length;
          paintDetail();
        }
        return;
      }
    }
    const nav = e.target.closest('.s-gal-nav');
    if(nav){
      const holder = nav.closest('.s-card-img');
      if(holder){
        const p = products.find(x=> x.id === holder.dataset.pid);
        const ciRaw = holder.dataset.ci;
        const list = p ? imgsOf(p, ciRaw === '' ? null : +ciRaw) : [];
        if(list.length > 1){
          const gi = parseInt(holder.dataset.gi, 10) || 0;
          holder.dataset.gi = (gi + (+nav.dataset.dir) + list.length) % list.length;
          paintCard(holder);
        }
      }
      return;
    }
    const sw = e.target.closest('.s-swatch');
    if(sw){
      const card = sw.closest('.s-card');
      if(card){
        card.querySelectorAll('.s-swatch').forEach(b=> b.classList.toggle('active', b === sw));
        const holder = card.querySelector('.s-card-img');
        if(holder){ holder.dataset.ci = sw.dataset.ci; holder.dataset.gi = 0; paintCard(holder); }
      }
      return;
    }
    const box = e.target.closest('.s-contact-box');
    if(!box) return;
    const action = box.dataset.action;
    const value = box.dataset.value || '';
    if(action === 'open'){
      if(value) window.open(value, '_blank', 'noopener');
    }else{
      // copy
      const done = ()=> toast('\u0E04\u0E31\u0E14\u0E25\u0E2D\u0E01\u0E41\u0E25\u0E49\u0E27 \u2713');
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(value).then(done).catch(()=>{
          const ta = document.createElement('textarea'); ta.value = value; document.body.appendChild(ta); ta.select();
          try{ document.execCommand('copy'); }catch(err){} ta.remove(); done();
        });
      }else{
        const ta = document.createElement('textarea'); ta.value = value; document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); }catch(err){} ta.remove(); done();
      }
    }
  });
})();
</script>
</body>
</html>
